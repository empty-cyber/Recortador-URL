spring.application.name=acortador

# Database — ajusta usuario, contraseña y nombre de BD según tu entorno
spring.datasource.url=jdbc:postgresql://localhost:5432/acortador_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — Flyway gestiona el esquema, Hibernate solo lo valida
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Server
server.port=8080

# App
app.base-url=http://localhost:8080

# SpringDoc / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.api-docs.path=/v3/api-docs
