<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <defs>
    <radialGradient id="bodyGrad" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
  </defs>

  <!-- Sombra -->
  <ellipse cx="100" cy="212" rx="58" ry="9" fill="rgba(0,0,0,0.10)"/>

  <!-- Cuerpo redondo -->
  <circle cx="100" cy="112" r="84" fill="url(#bodyGrad)"/>

  <!-- Coloretes -->
  <circle cx="63"  cy="133" r="17" fill="#f9a8d4" opacity="0.50"/>
  <circle cx="137" cy="133" r="17" fill="#f9a8d4" opacity="0.50"/>

  <!-- Ojo izquierdo -->
  <circle cx="78"  cy="98"  r="17" fill="white"/>
  <circle cx="81"  cy="102" r="10" fill="#1e1b4b"/>
  <circle cx="85"  cy="96"  r="4"  fill="white"/>

  <!-- Ojo derecho -->
  <circle cx="122" cy="98"  r="17" fill="white"/>
  <circle cx="119" cy="102" r="10" fill="#1e1b4b"/>
  <circle cx="123" cy="96"  r="4"  fill="white"/>

  <!-- Sonrisa -->
  <path d="M 70 132 Q 100 162 130 132"
        stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Tijeras (esquina superior izquierda) -->
  <line x1="5"  y1="38" x2="70" y2="82" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <line x1="5"  y1="70" x2="70" y2="86" stroke="#f59e0b" stroke-width="9" stroke-linecap="round"/>
  <circle cx="70" cy="84" r="8" fill="#d97706"/>
  <ellipse cx="4" cy="36" rx="13" ry="10" fill="none" stroke="#fbbf24" stroke-width="6"/>
  <ellipse cx="4" cy="72" rx="13" ry="10" fill="none" stroke="#f59e0b" stroke-width="6"/>

  <!-- Eslabón de cadena (esquina superior derecha) -->
  <rect x="134" y="10" width="54" height="37" rx="18" fill="none" stroke="#f472b6" stroke-width="5"/>
  <rect x="147" y="20" width="28" height="17" rx="8"  fill="rgba(255,255,255,0.25)"/>

  <!-- Estrellitas decorativas -->
  <circle cx="168" cy="72"  r="5" fill="#fde68a"/>
  <circle cx="18"  cy="158" r="5" fill="#6ee7b7"/>
  <circle cx="172" cy="162" r="4" fill="#fbcfe8"/>
  <circle cx="30"  cy="198" r="3" fill="#fcd34d"/>
  <circle cx="162" cy="198" r="3" fill="#c4b5fd"/>
</svg>
